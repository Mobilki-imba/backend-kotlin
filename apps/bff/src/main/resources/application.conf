server {
    port = 8080
    port = ${?BFF_PORT}
    host = "0.0.0.0"
}

database {
    url = "jdbc:postgresql://localhost:5432/trading"
    url = ${?DATABASE_URL}
    user = "trading"
    user = ${?DATABASE_USER}
    password = "trading"
    password = ${?DATABASE_PASSWORD}
    pool {
        initial-size = 10
        max-size = 50
        max-idle-time = "30m"
        max-life-time = "30m"
        max-acquire-time = "2s"
    }
}

redis {
    uri = "redis://localhost:6379"
    uri = ${?REDIS_URI}
}

market-data {
    grpc {
        address = "localhost:9090"
        address = ${?MARKET_GRPC_ADDRESS}
    }
}

auth {
    access-token-ttl = "1h"
    refresh-token-ttl = "30d"
    bcrypt-cost = 12
    jwt {
        issuer = "trading-bff"
        audience = "trading-android"
        secret = ${?JWT_SECRET}
    }
    rate-limit {
        login-attempts = 5
        login-window = "15m"
        register-rps = 1
    }
    starting-balance-micro = 100000000000
}

orders {
    market {
        commission-bps = 3
    }
    limit-executor {
        tick-interval-ms = 500
        partial-fill-probability = 0.3
    }
    idempotency {
        ttl = "5m"
    }
}

websocket {
    ping-interval = "30s"
    timeout = "60s"
    outgoing-send-timeout = "1s"
    idle-session-timeout = "5m"
}
