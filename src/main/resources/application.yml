spring:
  application:
    name: trading-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/trading
    username: ${DB_USER:trading}
    password: ${DB_PASS:trading}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  cache:
    type: redis
    redis:
      time-to-live: 5000

price-service:
  url: ${PRICE_SERVICE_URL:http://localhost:8081}

server:
  port: 8080

# OpenTelemetry — адрес коллектора (Grafana Alloy / OTEL Collector)
otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0   # 100% в dev, снизить в prod
