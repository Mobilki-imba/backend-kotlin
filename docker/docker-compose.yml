name: trading-bff

services:
  postgres:
    image: postgres:16-alpine
    container_name: trading-postgres
    environment:
      POSTGRES_DB: trading
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: trading-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data

  bff:
    profiles: ["app"]
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: trading-bff
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      BFF_PORT: 8080
      DATABASE_URL: "r2dbc:postgresql://postgres:5432/trading"
      DATABASE_USER: trading
      DATABASE_PASSWORD: trading
      REDIS_URI: "redis://redis:6379"
      MARKET_GRPC_ADDRESS: "host.docker.internal:9090"
      LOG_FORMAT: json
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  redis_data:
