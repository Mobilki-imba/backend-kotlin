syntax = "proto3";

package marketdata.v1;

option java_package = "marketdata.v1";
option java_multiple_files = true;

// MarketData service — реальный gRPC контракт с Go-бэком на localhost:9090.
// Источник правды: /GRPC_API.md в корне репозитория.
service MarketData {
    rpc ListInstruments (ListInstrumentsRequest) returns (ListInstrumentsResponse);
    rpc GetInstrument (GetInstrumentRequest) returns (Instrument);
    rpc GetQuote (GetQuoteRequest) returns (Quote);
    rpc GetCandles (GetCandlesRequest) returns (GetCandlesResponse);
    rpc GetOrderBook (GetOrderBookRequest) returns (OrderBook);
    rpc StreamTicks (StreamTicksRequest) returns (stream Tick);
    rpc GetQuotesRange (GetQuotesRangeRequest) returns (stream Tick);
}

message ListInstrumentsRequest {}

message ListInstrumentsResponse {
    repeated Instrument instruments = 1;
}

message GetInstrumentRequest {
    uint32 instrument_id = 1;
}

message Instrument {
    uint32 id = 1;
    string ticker = 2;
    string name = 3;
    string currency = 4;
    uint32 lot_size = 5;
    int64 price_step_micro = 6;
    bool is_active = 7;
}

message GetQuoteRequest {
    uint32 instrument_id = 1;
}

message Quote {
    uint32 instrument_id = 1;
    string ticker = 2;
    int64 price_micro = 3;
    int64 bid_micro = 4;
    int64 ask_micro = 5;
    int64 open_micro = 6;
    int64 high_micro = 7;
    int64 low_micro = 8;
    uint64 day_volume = 9;
    int32 change_bps = 10;
    int64 timestamp_ns = 11;
}

message GetCandlesRequest {
    uint32 instrument_id = 1;
    string interval = 2;     // "1m", "5m", "15m", "1h", "1d"
    int64 from_ns = 3;       // 0 = no lower bound
    int64 to_ns = 4;         // 0 = current time
    uint32 limit = 5;        // 0 = 100, max = 1000
    bool include_open = 6;
}

message GetCandlesResponse {
    repeated Candle candles = 1;
}

message Candle {
    uint32 instrument_id = 1;
    string interval = 2;
    int64 open_time_ns = 3;
    int64 open_micro = 4;
    int64 high_micro = 5;
    int64 low_micro = 6;
    int64 close_micro = 7;
    uint64 volume = 8;
    uint32 trades = 9;
    bool is_closed = 10;
}

message GetOrderBookRequest {
    uint32 instrument_id = 1;
}

message OrderBook {
    uint32 instrument_id = 1;
    repeated OrderBookLevel bids = 2;     // 10 levels, descending price
    repeated OrderBookLevel asks = 3;     // 10 levels, ascending price
    int64 timestamp_ns = 4;
}

message OrderBookLevel {
    int64 price_micro = 1;
    uint64 quantity = 2;
}

message StreamTicksRequest {
    repeated uint32 instrument_ids = 1;   // empty = all instruments
}

message Tick {
    uint32 instrument_id = 1;
    string ticker = 2;
    int64 timestamp_ns = 3;
    int64 price_micro = 4;
    uint32 volume = 5;
    int64 bid_micro = 6;
    int64 ask_micro = 7;
}

message GetQuotesRangeRequest {
    repeated uint32 instrument_ids = 1;   // empty = all
    int64 from_ns = 2;                    // 0 = stream from now
    int64 to_ns = 3;                      // 0 = stream indefinitely
}
